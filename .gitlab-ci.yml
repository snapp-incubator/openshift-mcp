stages:
  - test
  - build
  - release

variables:
  DOCKERFILE: Dockerfile
  GIT_SUBMODULE_STRATEGY: recursive
  OKD4_TEH1_REGISTRY: image-registry.apps.private.okd4.teh-1.snappcloud.io
  OKD4_TEH2_REGISTRY: image-registry.apps.private.okd4.teh-2.snappcloud.io
  GOPROXY: "https://repo.snapp.tech/repository/goproxy/,direct"
  OKD4_IMAGE_PATH: snappcloud-tools/openshift-mcp

.docker:
  image: docker:stable
  services:
    - docker:dind

.go:
  image: registry.snapp.tech/docker/golang:1.25-alpine
  variables:
    GOPATH: "${CI_PROJECT_DIR}/.go"
    GOPROXY: "https://repo.snapp.tech/repository/goproxy/,direct"
    GONOSUMDB: "gitlab.snapp.ir"
    GOFLAGS: "-mod=readonly"
  cache:
    key:
      files: [go.sum]
    paths: [.go/pkg/mod/]

.publish_image:
  extends: .docker
  stage: build
  script:
    - |
      set -e
      echo "$TEH1_TOKEN" | docker login -u unused "$OKD4_TEH1_REGISTRY" --password-stdin
      echo "$TEH2_TOKEN" | docker login -u unused "$OKD4_TEH2_REGISTRY" --password-stdin
      # registry.snapp.tech is this instance's GitLab container registry ($CI_REGISTRY).
      # Log in with the built-in pipeline credentials so the dind daemon can pull the
      # internal base image registry.snapp.tech/docker/golang during docker build.
      echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" "$CI_REGISTRY" --password-stdin
      docker build \
        --build-arg GOPROXY="$GOPROXY" \
        --build-arg VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}" \
        -t "$OKD4_TEH1_REGISTRY/$OKD4_IMAGE_PATH:$IMAGE_TAG" \
        -t "$OKD4_TEH2_REGISTRY/$OKD4_IMAGE_PATH:$IMAGE_TAG" \
        -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" .
      docker push "$OKD4_TEH1_REGISTRY/$OKD4_IMAGE_PATH:$IMAGE_TAG"
      docker push "$OKD4_TEH2_REGISTRY/$OKD4_IMAGE_PATH:$IMAGE_TAG"
      docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"

go:lint:
  extends: .go
  stage: test
  variables:
    GOSUMDB: "off"
    GOLANGCI_LINT_VERSION: "v2.12.2"
  before_script:
    - apk add --no-cache git make
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.snapp.ir".insteadOf "https://gitlab.snapp.ir"
    - export PATH="$(go env GOPATH)/bin:$PATH"
    - go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
  script:
    - golangci-lint run ./...
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

go:test:
  extends: .go
  stage: test
  before_script:
    - apk add --no-cache git make
    - git config --global url."https://gitlab-ci-token:${CI_JOB_TOKEN}@gitlab.snapp.ir".insteadOf "https://gitlab.snapp.ir"
    - go mod download
  script:
    - go test ./internal/...
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

openshift-mcp:staging:
  extends: .publish_image
  variables:
    IMAGE_TAG: staging
    TEH1_TOKEN: $TEH1_STAGING_PUSH_TOKEN
    TEH2_TOKEN: $TEH2_STAGING_PUSH_TOKEN
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

openshift-mcp:production:
  extends: .publish_image
  variables:
    IMAGE_TAG: $CI_COMMIT_TAG
    TEH1_TOKEN: $TEH1_PRODUCTION_PUSH_TOKEN
    TEH2_TOKEN: $TEH2_PRODUCTION_PUSH_TOKEN
  rules:
    - if: $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

